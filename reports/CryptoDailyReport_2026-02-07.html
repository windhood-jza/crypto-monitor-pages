<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CryptoMonitor 2026-02-07</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Design System */
:root {
  --bg: #080808;
  --bg-elevated: #111113;
  --bg-card: #18181b;
  --bg-card-hover: #202025;
  --border: #27272a;
  --border-subtle: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #22c55e;
  --accent-dim: rgba(34, 197, 94, 0.12);
  --accent-glow: rgba(34, 197, 94, 0.25);
  --p1: #ef4444;
  --p1-dim: rgba(239, 68, 68, 0.15);
  --p2: #f59e0b;
  --p2-dim: rgba(245, 158, 11, 0.15);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* Typography */
html { font-size: 16px; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  letter-spacing: -0.01em;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 20px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo span { color: var(--accent); }

.date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Stats Grid */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
  transition: all 0.2s ease;
}

.stat-card:active {
  transform: scale(0.97);
  background: var(--bg-card-hover);
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--accent);
  display: block;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Container */
.container {
  padding: 20px 16px 40px;
  max-width: 600px;
  margin: 0 auto;
}

/* Section */
.section {
  margin-bottom: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color 0.2s ease;
}

.section:focus-within,
.section:hover {
  border-color: var(--border-subtle);
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(255,255,255,0.05);
  user-select: none;
}

.section-header:active {
  background: var(--bg-card-hover);
}

.section-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-icon {
  width: 36px;
  height: 36px;
  background: var(--accent-dim);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.section-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
}

.section-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-left: 6px;
}

.section-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 1.1rem;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.section.open .section-arrow {
  transform: rotate(90deg);
  color: var(--accent);
}

.section-content {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.section.open .section-content {
  grid-template-rows: 1fr;
}

.section-inner {
  overflow: hidden;
  padding: 0 16px 16px;
}

.section-divider {
  height: 1px;
  background: var(--border);
  margin: 0 16px;
}

/* Item Cards */
.item {
  margin-top: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  transition: all 0.2s ease;
}

.item:active {
  background: var(--bg-card-hover);
}

.item-priority {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.p1 {
  background: var(--p1-dim);
  color: var(--p1);
  border: 1px solid rgba(239, 68, 68, 0.25);
}

.p2 {
  background: var(--p2-dim);
  color: var(--p2);
  border: 1px solid rgba(245, 158, 11, 0.25);
}

.item-title {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
}

.item-meta {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.meta-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
  background: var(--bg-card);
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.item-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  font-size: 0.8rem;
  color: var(--accent);
  text-decoration: none;
  transition: gap 0.2s ease;
}

.item-link:hover {
  gap: 8px;
}

/* Info Cards */
.info-card {
  padding: 12px;
  background: var(--bg-elevated);
  border-radius: 10px;
  margin-top: 10px;
  border: 1px solid var(--border);
}

.info-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.info-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Footer */
.footer {
  text-align: center;
  padding: 32px 20px 24px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

.footer-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.footer-link {
  color: var(--accent);
  text-decoration: none;
}

/* Animations */
@keyframes fadeSlideUp {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.section.open .section-inner {
  animation: fadeSlideUp 0.3s ease forwards;
}

/* Stagger animations */
.section:nth-child(1) .section-inner { animation-delay: 0s; }
.section:nth-child(2) .section-inner { animation-delay: 0.05s; }
.section:nth-child(3) .section-inner { animation-delay: 0.1s; }

/* Desktop */
@media (min-width: 768px) {
  .header { padding: 32px 24px 24px; }
  .container { padding: 32px 24px 60px; }
  .section-header { padding: 20px 20px; }
  .section-inner { padding: 0 20px 20px; }
  .section-divider { margin: 0 20px; }
  .logo { font-size: 1.75rem; }
  .stat-value { font-size: 1.5rem; }
}

/* Dark mode support */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fafafa;
    --bg-elevated: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #f5f5f5;
    --border: #e4e4e7;
    --border-subtle: #d4d4d8;
    --text: #18181b;
    --text-secondary: #71717a;
    --text-muted: #a1a1aa;
    --accent-dim: rgba(34, 197, 94, 0.1);
    --p1-dim: rgba(239, 68, 68, 0.1);
    --p2-dim: rgba(245, 158, 11, 0.1);
  }
}
</style>
</head>
<body>
<!-- Header -->
<header class="header">
  <div class="header-top">
    <h1 class="logo"><span>◈</span> CryptoMonitor</h1>
    <time class="date">2026.02.07</time>
  </div>
  <div class="stats-row">
    <div class="stat-card" tabindex="0">
      <span class="stat-value">15</span>
      <span class="stat-label">推文</span>
    </div>
    <div class="stat-card" tabindex="0">
      <span class="stat-value">6</span>
      <span class="stat-label">P1 情报</span>
    </div>
    <div class="stat-card" tabindex="0">
      <span class="stat-value">7</span>
      <span class="stat-label">P2 情报</span>
    </div>
  </div>
</header>

<main class="container">
  <!-- P1 Section (Default Open) -->
  <article class="section open" data-section="p1">
    <div class="section-header" role="button" tabindex="0" aria-expanded="true">
      <div class="section-left">
        <div class="section-icon">⚡</div>
        <h2 class="section-title">P1 必读情报<span class="section-count">6</span></h2>
      </div>
      <div class="section-arrow" aria-hidden="true">›</div>
    </div>
    <div class="section-content">
      <div class="section-inner">
        <div class="info-card"><p class="info-desc">暂无数据</p></div>
      </div>
    </div>
  </article>

  <!-- P2 Section (Default Open) -->
  <article class="section open" data-section="p2">
    <div class="section-header" role="button" tabindex="0" aria-expanded="true">
      <div class="section-left">
        <div class="section-icon">◆</div>
        <h2 class="section-title">P2 重要情报<span class="section-count">7</span></h2>
      </div>
      <div class="section-arrow" aria-hidden="true">›</div>
    </div>
    <div class="section-content">
      <div class="section-inner">
        <div class="info-card"><p class="info-desc">暂无数据</p></div>
      </div>
    </div>
  </article>

  <!-- Insights Section -->
  <article class="section" data-section="insights">
    <div class="section-header" role="button" tabindex="0" aria-expanded="false">
      <div class="section-left">
        <div class="section-icon">◇</div>
        <h2 class="section-title">洞察总结</h2>
      </div>
      <div class="section-arrow" aria-hidden="true">›</div>
    </div>
    <div class="section-content">
      <div class="section-inner">
        <div class="info-card"><p class="info-desc">暂无数据</p></div>
      </div>
    </div>
  </article>

  <!-- Tracking Section -->
  <article class="section" data-section="tracking">
    <div class="section-header" role="button" tabindex="0" aria-expanded="false">
      <div class="section-left">
        <div class="section-icon">○</div>
        <h2 class="section-title">跟踪进展</h2>
      </div>
      <div class="section-arrow" aria-hidden="true">›</div>
    </div>
    <div class="section-content">
      <div class="section-inner">
        <div class="info-card"><p class="info-desc">暂无数据</p></div>
      </div>
    </div>
  </article>

  <!-- Macro Section -->
  <article class="section" data-section="macro">
    <div class="section-header" role="button" tabindex="0" aria-expanded="false">
      <div class="section-left">
        <div class="section-icon">●</div>
        <h2 class="section-title">宏观经济</h2>
      </div>
      <div class="section-arrow" aria-hidden="true">›</div>
    </div>
    <div class="section-content">
      <div class="section-inner">
        <div class="info-card"><p class="info-desc">暂无数据</p></div>
      </div>
    </div>
  </article>
</main>

<!-- Footer -->
<footer class="footer">
  <p class="footer-text">Generated by <a href="https://github.com/windhood-jza/crypto-monitor-pages" class="footer-link" target="_blank">CryptoMonitor</a> • 2026-02-07 15:02</p>
</footer>

<script>
(function() {
  // Section toggle
  document.querySelectorAll('.section-header').forEach(function(header) {
    header.addEventListener('click', function() {
      var section = this.closest('.section');
      var isOpen = section.classList.contains('open');
      
      // Toggle current
      section.classList.toggle('open');
      this.setAttribute('aria-expanded', !isOpen);
    });
    
    header.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });
  });
  
  // Auto-expand P1/P2
  document.querySelectorAll('.section[data-section="p1"], .section[data-section="p2"]').forEach(function(s) {
    s.classList.add('open');
  });
})();
</script>
</body>
</html>
