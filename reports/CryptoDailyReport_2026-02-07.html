<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CryptoMonitor 2026-02-07</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0d0d12; --card: #16161e; --border: #2a2a3a; --text: #f0f0f0; --sec: #888; --accent: #34c759; --p1: #ff453a; --p2: #ff9f0a; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 40px; }
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 16px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
.stats { display: flex; gap: 16px; flex-wrap: wrap; }
.stat { padding: 8px 14px; background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.2); border-radius: 10px; font-size: 0.85rem; }
.stat span { color: var(--accent); font-family: monospace; font-weight: 600; }
.container { padding: 16px; max-width: 700px; margin: 0 auto; }
.section { margin-bottom: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.section-title { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; }
.sec-icon { width: 32px; height: 32px; background: rgba(52,199,89,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.arrow { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--sec); font-size: 1.2rem; transition: transform 0.2s; }
.section.open .arrow { transform: rotate(90deg); }
.content { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.section.open .content { display: block; }
.item { padding: 12px; margin-top: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; }
.pri { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; font-family: monospace; margin-right: 8px; }
.p1 { background: rgba(255,69,58,0.15); color: var(--p1); }
.p2 { background: rgba(255,159,10,0.15); color: var(--p2); }
.title { font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; }
.desc { font-size: 0.8rem; color: var(--sec); }
.link { display: inline-block; margin-top: 8px; font-size: 0.75rem; color: var(--accent); text-decoration: none; }
.footer { text-align: center; padding: 24px 16px; color: var(--sec); font-size: 0.75rem; }
@keyframes fade { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.section.open .content { animation: fade 0.2s ease; }
</style>
</head>
<body>
<header class="header">
<h1>🔐 CryptoMonitor 2026-02-07</h1>
<div class="stats">
<div class="stat">推文: <span>15</span></div>
<div class="stat">P1: <span>6</span></div>
<div class="stat">P2: <span>7</span></div>
</div>
</header>
<div class="container">
<div class="section open">
<div class="section-header" onclick="this.parentElement.classList.toggle('open')">
<div class="section-title"><div class="sec-icon">🚨</div>P1必读情报 (6)</div>
<div class="arrow">›</div>
</div>
<div class="content">

</div>
</div>
<div class="section open">
<div class="section-header" onclick="this.parentElement.classList.toggle('open')">
<div class="section-title"><div class="sec-icon">⭐</div>P2重要情报 (7)</div>
<div class="arrow">›</div>
</div>
<div class="content">

</div>
</div>
</div>
<footer class="footer">Generated by CryptoMonitor • 2026-02-07 14:59</footer>
</body>
</html>
