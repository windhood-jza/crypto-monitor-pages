<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor 报告列表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
            --accent-green: #3fb950;
            --border: #30363d;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px;
            max-width: 1200px;
            margin: 0 auto;
            line-height: 1.6;
        }
        @media (min-width: 768px) {
            body { padding: 40px; }
        }
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        @media (min-width: 768px) {
            .header { padding: 40px; margin-bottom: 40px; }
        }
        .header h1 {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-blue), #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2rem; }
        }
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        @media (min-width: 768px) {
            .header .subtitle { font-size: 0.9rem; }
        }
        .stats-row {
            display: flex;
            gap: 8px;
            margin: 12px 0 0;
            flex-wrap: wrap;
        }
        @media (min-width: 768px) {
            .stats-row { gap: 16px; margin: 24px 0 0; }
        }
        .stat {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            flex: 1;
            min-width: calc(33.33% - 6px);
        }
        @media (min-width: 768px) {
            .stat { padding: 16px 24px; min-width: 120px; border-radius: 12px; }
        }
        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-blue);
        }
        @media (min-width: 768px) {
            .stat-value { font-size: 1.75rem; }
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        @media (min-width: 768px) {
            .stat-label { font-size: 0.8rem; margin-top: 4px; }
        }
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
        }
        @media (min-width: 768px) {
            .section { padding: 24px; margin-bottom: 20px; }
        }
        .section h2 {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        @media (min-width: 768px) {
            .section h2 { font-size: 1.1rem; margin-bottom: 20px; padding-bottom: 16px; }
        }
        .tag {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }
        @media (min-width: 768px) {
            .tag { font-size: 0.75rem; padding: 2px 8px; margin-right: 8px; }
        }
        .tag.p1 { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
        .tag.p2 { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
        .tag.p3 { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        .report-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        @media (min-width: 768px) {
            .report-card { padding: 20px; margin-bottom: 16px; border-radius: 12px; }
        }
        .report-card:hover {
            border-color: var(--accent-blue);
        }
        .report-info h3 {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        @media (min-width: 768px) {
            .report-info h3 { font-size: 1rem; margin-bottom: 6px; }
        }
        .report-meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        @media (min-width: 768px) {
            .report-meta { font-size: 0.85rem; }
        }
        .report-link {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 6px 10px;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .report-link { font-size: 0.85rem; padding: 10px 20px; }
        }
        .report-link:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        @media (min-width: 768px) {
            .quick-stats { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        .quick-stat {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        @media (min-width: 768px) {
            .quick-stat { padding: 16px; border-radius: 12px; }
        }
        .quick-stat-title {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        @media (min-width: 768px) {
            .quick-stat-title { font-size: 0.75rem; margin-bottom: 8px; }
        }
        .quick-stat-value {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
        }
        @media (min-width: 768px) {
            .quick-stat-value { font-size: 1.5rem; }
        }
        .quick-stat-value.red { color: var(--accent-red); }
        .quick-stat-value.blue { color: var(--accent-blue); }
        .quick-stat-value.green { color: var(--accent-green); }
        .footer {
            text-align: center;
            padding: 16px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }
        @media (min-width: 768px) {
            .footer { padding: 40px; margin-top: 40px; font-size: 0.8rem; }
        }
        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
