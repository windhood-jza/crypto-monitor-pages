<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor 报告列表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --text-primary: #c9d1d9; --text-secondary: #8b949e; --accent-blue: #58a6ff; --accent-red: #f85149; --accent-green: #3fb950; --border: #30363d; --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); padding: 12px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { body { padding: 40px; } }
        .header { background: linear-gradient(135deg, var(--bg-secondary), #21262d); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        @media (min-width: 768px) { .header { padding: 40px; margin-bottom: 40px; } }
        .header h1 { font-family: var(--font-mono); font-size: 1.2rem; background: linear-gradient(90deg, var(--accent-blue), #a371f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (min-width: 768px) { .header h1 { font-size: 2rem; } }
        .subtitle { color: var(--text-secondary); font-size: 0.75rem; margin-top: 8px; }
        .section { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        @media (min-width: 768px) { .section { padding: 24px; margin-bottom: 20px; } }
        .section h2 { font-family: var(--font-mono); font-size: 0.9rem; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        @media (min-width: 768px) { .section h2 { font-size: 1.1rem; margin-bottom: 20px; padding-bottom: 16px; } }
        .report-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .report-card:hover { border-color: var(--accent-blue); }
        .report-info h3 { font-family: var(--font-mono); font-size: 0.85rem; margin-bottom: 4px; }
        .report-meta { font-size: 0.7rem; color: var(--text-secondary); }
        .report-link { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-blue); text-decoration: none; padding: 6px 10px; border: 1px solid var(--accent-blue); border-radius: 6px; }
        .report-link:hover { background: rgba(88, 166, 255, 0.1); }
        .quick-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .quick-stat { background: var(--bg-tertiary); border-radius: 8px; padding: 10px; text-align: center; }
        .quick-stat-title { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-secondary); }
        .quick-stat-value { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; }
        .quick-stat-value.red { color: var(--accent-red); }
        .quick-stat-value.blue { color: var(--accent-blue); }
        .quick-stat-value.green { color: var(--accent-green); }
        .footer { text-align: center; padding: 16px; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.65rem; border-top: 1px solid var(--border); margin-top: 16px; }
        .footer a { color: var(--accent-blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>> CryptoMonitor 报告列表</h1>
        <div class="subtitle">加密货币合规信息监控日报 | 自动生成</div>
    </div>

    <div class="section">
        <h2>> 最新报告</h2>
        <div class="report-card">
            <div class="report-info">
                <h3>📅 2026-02-04</h3>
                <div class="report-meta">日度报告 | 自动生成</div>
            </div>
            <a href="CryptoDailyReport_2026-02-04_-D1.md" class="report-link">查看 →</a>
        </div>
        <div class="report-card">
            <div class="report-info">
                <h3>📅 2026-02-03</h3>
                <div class="report-meta">日度报告</div>
            </div>
            <a href="CryptoDailyReport_2026-02-03_-D1.md" class="report-link">查看 →</a>
        </div>
    </div>

    <div class="section">
        <h2>> 快速统计</h2>
        <div class="quick-stats">
            <div class="quick-stat">
                <div class="quick-stat-title">P1 必读</div>
                <div class="quick-stat-value red">5</div>
            </div>
            <div class="quick-stat">
                <div class="quick-stat-title">P2 重要</div>
                <div class="quick-stat-value blue">8</div>
            </div>
            <div class="quick-stat">
                <div class="quick-stat-title">P3 参考</div>
                <div class="quick-stat-value green">45</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>🤖 Generated by <strong>CryptoMonitor</strong> | OpenClaw Skill</p>
        <p style="margin-top: 8px;"><a href="https://github.com/windhood-jza/crypto-monitor-pages">GitHub Pages</a></p>
    </div>
</body>
</html>
