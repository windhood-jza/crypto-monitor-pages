<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor 报告列表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #11161d;
            --bg-tertiary: #1a212c;
            --bg-card: #151c26;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-cyan: #39d353;
            --accent-blue: #58a6ff;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            --border-color: #30363d;
            --gradient-1: linear-gradient(135deg, #39d353 0%, #58a6ff 50%, #a371f7 100%);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) { body { padding: 40px; } }
        
        header {
            background: linear-gradient(180deg, rgba(57, 211, 83, 0.08) 0%, rgba(88, 166, 255, 0.08) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient-1);
        }
        
        header h1 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        @media (min-width: 768px) { header h1 { font-size: 2rem; } }
        
        header .subtitle { color: var(--text-secondary); font-size: 0.85rem; }
        
        header .meta {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        header .meta span {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 6px;
        }
        
        section { margin-bottom: 24px; }
        
        section h2 {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        section h2::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--gradient-1);
            border-radius: 2px;
        }
        
        .report-list { display: grid; gap: 12px; }
        
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            transition: all 0.2s;
        }
        
        .report-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }
        
        .report-date {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .report-period {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .report-stats {
            display: flex;
            gap: 8px;
        }
        
        .stat-badge {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .stat-badge.p1 {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }
        
        .stat-badge.p2 {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-yellow);
        }
        
        .stat-badge.p3 {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-cyan);
        }
        
        .report-link {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .report-link:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        
        .current-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .current-stat {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .current-stat-value {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
        
        .current-stat-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border-top: 1px solid var(--border-color);
            margin-top: 32px;
        }
        
        footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

        <div class="meta">
            <span>🤖 OpenClaw Skill</span>

    <section>

            <div class="current-stat">

            <div class="current-stat">

    <section>

    </section>

    <footer>
        <p>🤖 Generated by <strong>CryptoMonitor</strong> | OpenClaw Skill</p>
        <p style="margin-top: 8px;">
            <a href="https://github.com/windhood-jza/crypto-monitor-pages">GitHub Pages</a> · 
            <a href="https://github.com/openclaw/openclaw">OpenClaw</a>
        </p>
    </footer>
</body>
</html>
