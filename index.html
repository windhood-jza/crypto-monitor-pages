<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor Reports</title>
    <style>
        :root { --bg-primary: #0d1117; --bg-secondary: #161b22; --text-primary: #c9d1d9; --text-secondary: #8b949e; --accent-blue: #58a6ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 40px; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5em; background: linear-gradient(90deg, var(--accent-blue), #a371f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-secondary); margin-bottom: 40px; }
        .report-card { background: var(--bg-secondary); border: 1px solid #30363d; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .report-title { font-size: 1.3em; font-weight: 600; margin-bottom: 10px; }
        .report-link { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
        .report-link:hover { text-decoration: underline; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.8em; margin-right: 8px; }
        .tag.daily { background: rgba(88, 166, 255, 0.2); color: var(--accent-blue); }
    </style>
</head>
<body>
    <h1>⚡ CryptoMonitor Reports</h1>
    <div class="subtitle">加密货币合规信息监控报告 | Generated: {TODAY}</div>
    <h2>📊 最新报告</h2>
    <div class="report-card">
        <div class="report-title">📅 {TODAY} ({'日度' if DAYS == 1 else f'{DAYS}日'})</div>
        <p><span class="tag daily">Daily</span> {ACCOUNT_COUNT}个账号，{TOTAL_TWEETS}条推文</p>
        <a href="CryptoDailyReport_{TODAY}_-D1.html" class="report-link">查看报告 →</a>
    </div>
    <div class="report-card">
        <div class="report-title">📅 2026-02-03</div>
        <a href="CryptoDailyReport_2026-02-03_-D1.html" class="report-link">查看报告 →</a>
    </div>
    <div style="margin-top: 40px; color: var(--text-secondary); font-size: 0.9em;">
        <p>🤖 Generated by CryptoMonitor | OpenClaw Skill</p>
    </div>
</body>
</html>
