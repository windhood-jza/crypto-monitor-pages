<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor Reports</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-secondary); margin-bottom: 40px; }
        .report-card {
            background: var(--bg-secondary);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .report-card:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
        .report-title { font-size: 1.3em; font-weight: 600; margin-bottom: 10px; }
        .report-meta { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 15px; }
        .report-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .report-link:hover { text-decoration: underline; }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        .tag.daily { background: rgba(88, 166, 255, 0.2); color: #58a6ff; }
        .tag.weekly { background: rgba(163, 113, 247, 0.2); color: #a371f7; }
    </style>
</head>
