<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMonitor 加密合规情报日报</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .tagline {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .stats-bar {
            display: inline-flex;
            gap: 20px;
            background: rgba(99, 102, 241, 0.1);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: #6366f1;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        /* Reports Section */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #6366f1, #8b5cf6);
            border-radius: 2px;
        }
        
        /* Report Cards */
        .reports-grid {
            display: grid;
            gap: 16px;
        }
        
        .report-card {
            background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        
        .report-card:hover {
            border-color: #6366f1;
            transform: translateX(8px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15);
        }
        
        .report-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .report-info {
            min-width: 0;
        }
        
        .report-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #58a6ff;
            margin-bottom: 6px;
        }
        
        .report-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 4px;
        }
        
        .report-desc {
            font-size: 0.85rem;
            color: #8b949e;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .report-meta {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .meta-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }
        
        .report-arrow {
            color: #6366f1;
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .report-card:hover .report-arrow {
            opacity: 1;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #161b22;
            border-radius: 16px;
            border: 1px dashed #30363d;
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .report-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .report-icon {
                margin: 0 auto;
            }
            
            .report-arrow {
                display: none;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #30363d;
            color: #6e7681;
            font-size: 0.85rem;
        }
        
        .footer a {
            color: #6366f1;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">🔐 CryptoMonitor</div>
            <p class="tagline">加密合规情报日报 · 每日自动更新</p>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-value" id="reportCount">-</div>
                    <div class="stat-label">Reports</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="latestDate">-</div>
                    <div class="stat-label">Latest</div>
                </div>
            </div>
        </header>
        
        <!-- Reports List -->
        <section>
            <h2 class="section-title">📚 历史报告</h2>
            <div class="reports-grid" id="reportsGrid">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载报告中...</p>
                </div>
            </div>
        </section>
        
        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <a href="https://github.com/windhood-jza/crypto-monitor-pages" target="_blank">CryptoMonitor</a></p>
            <p>GitHub Pages Auto-Deployed</p>
        </footer>
    </div>
    
    <script>
        async function loadReports() {
            const grid = document.getElementById('reportsGrid');
            const reportCount = document.getElementById('reportCount');
            const latestDate = document.getElementById('latestDate');
            
            try {
                // 加载 reports.json
                const response = await fetch('reports.json');
                if (!response.ok) throw new Error('Failed to load reports');
                
                const data = await response.json();
                const reports = data.reports || [];
                
                // 更新统计
                reportCount.textContent = reports.length;
                if (reports.length > 0) {
                    latestDate.textContent = reports[0].date;
                }
                
                // 渲染报告列表
                if (reports.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无报告</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = reports.map((report, index) => `
                    <a href="${report.url}" class="report-card" target="_blank">
                        <div class="report-icon">📄</div>
                        <div class="report-info">
                            <div class="report-date">📅 ${report.date}</div>
                            <div class="report-title">${report.title}</div>
                            <div class="report-desc">
                                ${report.p1 || 0} 条 P1 情报 · ${report.p2 || 0} 条 P2 情报 · ${report.tweets || 0} 条推文
                            </div>
                            <div class="report-meta">
                                <span class="meta-tag">P1: ${report.p1 || '-'}</span>
                                <span class="meta-tag">P2: ${report.p2 || '-'}</span>
                                <span class="meta-tag">推文: ${report.tweets || '-'}</span>
                            </div>
                        </div>
                        <div class="report-arrow">→</div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('加载失败:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <p>加载失败，请刷新重试</p>
                    </div>
                `;
            }
        }
        
        // 页面加载时获取报告列表
        loadReports();
    </script>
</body>
</html>
